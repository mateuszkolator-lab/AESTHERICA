version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: aesthetica_mongodb
    restart: always
    volumes:
      - mongodb_data:/data/db
      - ./backups:/backups
    environment:
      MONGO_INITDB_ROOT_USERNAME: aesthetica_admin
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
    networks:
      - aesthetica_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: aesthetica_backend
    restart: always
    environment:
      MONGO_URL: mongodb://aesthetica_admin:${MONGO_PASSWORD}@mongodb:27017/aesthetica_md?authSource=admin
      DB_NAME: aesthetica_md
      JWT_SECRET: ${JWT_SECRET}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      CORS_ORIGINS: http://${SERVER_IP},http://${SERVER_IP}:80,http://${SERVER_IP}:3000
    depends_on:
      - mongodb
    networks:
      - aesthetica_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        REACT_APP_BACKEND_URL: http://${SERVER_IP}
    container_name: aesthetica_frontend
    restart: always
    networks:
      - aesthetica_network

  nginx:
    image: nginx:alpine
    container_name: aesthetica_nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
    networks:
      - aesthetica_network

volumes:
  mongodb_data:
    driver: local

networks:
  aesthetica_network:
    driver: bridge
